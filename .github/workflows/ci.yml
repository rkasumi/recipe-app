name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm -s lint
      - run: pnpm -s typecheck
      - run: pnpm -s test
      - run: pnpm -s build
      - run: pnpm run recipe:validate
      - run: pnpm run check:secrets
